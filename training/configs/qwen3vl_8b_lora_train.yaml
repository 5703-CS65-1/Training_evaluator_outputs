### Qwen3-VL-8B-Thinking 完整 LoRA 微调模板
### 把数据集、训练轮次按需调整即可使用

### model
model_name_or_path: /root/autodl-fs/models/Qwen3-VL-8B-Thinking
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target: all

### dataset (示例：替换为你自己的多模态数据集)
dataset: mllm_demo
template: qwen3_vl_nothink   # 想训练带思维链的，改成 qwen3_vl 并准备含 <think> 的数据
cutoff_len: 4096
max_samples: 100000
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: /root/autodl-tmp/checkpoints/qwen3vl_8b_lora
logging_steps: 10
save_steps: 200
save_total_limit: 3
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: tensorboard
logging_dir: /root/autodl-tmp/checkpoints/qwen3vl_8b_lora/runs

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
gradient_checkpointing: true

